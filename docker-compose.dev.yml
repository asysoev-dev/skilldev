version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skilldev-postgres-dev
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skilldev-network

volumes:
  postgres_data_dev:

networks:
  skilldev-network:
    driver: bridge
