name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Build Docker image
        working-directory: ./frontend
        run: |
          docker build -t skilldev .
          docker save skilldev | gzip > /tmp/skilldev.tar.gz

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "/tmp/skilldev.tar.gz"
          target: "/tmp/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker load < /tmp/skilldev.tar.gz
            docker stop skilldev || true
            docker rm skilldev || true
            docker run -d --name skilldev -p 3005:80 --restart always skilldev
            rm /tmp/skilldev.tar.gz