services:
  postgres:
    image: postgres:16-alpine
    container_name: skilldev-postgres-prod
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - skilldev-network

  backend:
    build: ./backend
    container_name: skilldev-backend-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}
      NODE_ENV: production
      PORT: ${PORT:-3001}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - postgres
    restart: always
    networks:
      - skilldev-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skilldev-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/myskilldev.ru/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/myskilldev.ru/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - backend
    restart: always
    networks:
      - skilldev-network

  frontend-ssr:
    build:
      context: ./frontend
      dockerfile: Dockerfile.ssr
    container_name: skilldev-frontend-ssr
    command: node server.js
    ports:
      - "${SSR_PORT:-3000}:3000"
    environment:
      SSR_PORT: ${SSR_PORT:-3000}
      VUE_API_URL: ${VUE_API_URL}
    depends_on:
      - backend
    restart: always
    networks:
      - skilldev-network

volumes:
  postgres_data:

networks:
  skilldev-network:
    driver: bridge